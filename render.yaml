databases:
  - name: libraflow-db
    plan: free
    databaseName: libraflow
    user: libraflow

services:
  - type: web
    name: auth-service
    runtime: docker
    plan: free
    rootDir: auth-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: libraflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: catalog-service
    runtime: docker
    plan: free
    rootDir: catalog-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: libraflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: loan-service
    runtime: docker
    plan: free
    rootDir: loan-service
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: libraflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true