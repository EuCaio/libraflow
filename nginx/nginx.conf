events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=10s;

  upstream auth_service       { server auth-service:3001; }
  upstream catalog_service    { server catalog-service:3002; }
  upstream loan_service       { server loan-service:3003; }
  upstream notification_service { server notification-service:3004; }
  upstream report_service     { server report-service:3005; }

  server {
    listen 80;
    server_name _;

    # Health check global
    location /health {
      return 200 '{"status":"ok","service":"nginx-gateway"}';
      add_header Content-Type application/json;
    }

    # Auth Service
    location /auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Catalog Service
    location /catalog/ {
      proxy_pass http://catalog_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Loan Service
    location /loans/ {
      proxy_pass http://loan_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Notification Service
    location /notifications/ {
      proxy_pass http://notification_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Report Service
    location /reports/ {
      proxy_pass http://report_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Swagger Docs - redireciona para o serviço correto
    location /api-docs {
      proxy_pass http://loan_service/api-docs;
    }
  }
}
